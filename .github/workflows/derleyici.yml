name: DeterCode Linux Engine Build and Test

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: Depodaki Kodları Çek
      uses: actions/checkout@v4

    - name: DeterCode Çekirdeğini Modüler Olarak Derle
      run: g++ -O3 app/src/main/cpp/motor_cekirdegi.cpp app/src/main/cpp/matematik.cpp app/src/main/cpp/parser.cpp -o detercode_engine

    - name: Kendi Yazdığımız Scripti Çalıştır
      run: ./detercode_engine
      
