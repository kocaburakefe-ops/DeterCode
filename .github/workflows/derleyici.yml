name: DeterCode Android Native NDK Derleyici

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Kodları Depodan Çek
      uses: actions/checkout@v4

    - name: Android NDK Kurulumu
      uses: android-actions/setup-android@v3
      with:
        api-level: 33
        ndk-version: 25.2.9519653

    - name: C++ Çekirdeğini Android ARM64 İçin Derle (.so Kütüphanesi)
      run: |
        $ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android33-clang++ \
        -O3 -shared -fPIC -std=c++17 \
        -o libdtermotor.so motor_cekirdegi.cpp
        echo "Android ARM64 için low-level native kütüphane (.so) başarıyla mühürlendi."

    - name: Native Kütüphaneyi Paketle ve Hazırla
      uses: actions/upload-artifact@v4
      with:
        name: DeterCode-Android-Shared-Library
        path: libdtermotor.so
        
