name: DeterCode Android APK Derleme

on:
  push:
    branches: [ main ]

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
    - name: Kodları Depodan Çek
      uses: actions/checkout@v4

    # ==========================================================
    # İŞTE O 127 DUVARINI YIKAN YENİ TESİSAT BURASI USTA!
    # ==========================================================
    - name: Python Kurulumu Yap (Şef İçin Tornavida)
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Kule Otomasyonunu (Python Şefini) Tetikle
      run: python deter_automation/build_shifter.py
    # ==========================================================

    - name: Java Kurulumu Yap (Gradle İçin)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Gradle'ı Çalıştırılabilir Yap
      run: chmod +x gradlew
      continue-on-error: true # Eğer gradlew dosyası yoksa hata fırlatıp durmasın

    - name: Android APK'sını Derle (Bulut Garajı)
      run: ./gradlew assembleDebug
      
